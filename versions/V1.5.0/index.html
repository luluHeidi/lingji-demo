<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灵机系统 - IP权益应用</title>
    <!-- 主框架样式 -->
    <link rel="stylesheet" href="css/framework.css">
    <!-- Lucide图标库（本地） -->
    <script src="js/lucide.min.js"></script>
</head>
<body>
    <!-- 顶栏 -->
    <header class="top-bar">
        <!-- 左侧：系统Logo和名称 -->
        <div class="logo-section">
            <i data-lucide="zap" class="logo-icon"></i>
            <span class="system-name">灵机系统</span>
        </div>

        <!-- 中间：功能模块Tab -->
        <nav class="main-tabs">
            <button class="tab-item" data-tab="panorama">IP全景图</button>
            <button class="tab-item" data-tab="import">IP引入</button>
            <button class="tab-item" data-tab="production">IP权益生产</button>
            <button class="tab-item active" data-tab="monetization">IP权益应用</button>
        </nav>

        <!-- 右侧：Agent按钮 + 用户信息 -->
        <div class="user-section">
            <button class="agent-button">
                <i data-lucide="sparkles" class="agent-icon"></i>
                <span class="agent-text">灵机一动</span>
            </button>
            <div class="user-info">
                <span class="user-name">鲁海洋</span>
                <span class="user-role">管理员</span>
            </div>
            <div class="user-avatar">
                <i data-lucide="user" class="avatar-icon"></i>
            </div>
        </div>
    </header>

    <!-- 主体内容区 -->
    <div class="main-container">
        <!-- 左侧菜单栏 -->
        <aside class="sidebar">
            <nav class="sidebar-nav">
                <!-- 一级菜单：二创权应用 -->
                <div class="menu-group">
                    <div class="menu-item level-1" data-menu="video-auth">
                        <i data-lucide="video" class="menu-icon"></i>
                        <span class="menu-text">二创权应用</span>
                        <i data-lucide="chevron-down" class="expand-icon"></i>
                    </div>
                    <div class="submenu">
                        <div class="menu-item level-2" data-submenu="auth-available-list">
                            <span class="menu-text">可授片单</span>
                        </div>
                        <div class="menu-item level-2" data-submenu="project-management">
                            <span class="menu-text">项目管理</span>
                        </div>
                        <div class="menu-item level-2" data-submenu="rights-review">
                            <span class="menu-text">授权审查</span>
                        </div>
                    </div>
                </div>

                <!-- 一级菜单：改编权应用 -->
                <div class="menu-group">
                    <div class="menu-item level-1" data-menu="adaptation-auth">
                        <i data-lucide="pen-tool" class="menu-icon"></i>
                        <span class="menu-text">改编权应用</span>
                        <i data-lucide="chevron-down" class="expand-icon"></i>
                    </div>
                    <div class="submenu">
                        <div class="menu-item level-2" data-submenu="adaptation-management">
                            <span class="menu-text">授权管理</span>
                        </div>
                    </div>
                </div>

                <!-- 一级菜单：播放权应用 -->
                <div class="menu-group">
                    <div class="menu-item level-1" data-menu="broadcast-auth">
                        <i data-lucide="tv" class="menu-icon"></i>
                        <span class="menu-text">播放权应用</span>
                        <i data-lucide="chevron-down" class="expand-icon"></i>
                    </div>
                    <div class="submenu">
                        <div class="menu-item level-2" data-submenu="broadcast-management">
                            <span class="menu-text">授权管理</span>
                        </div>
                    </div>
                </div>

                <!-- 一级菜单：商业化权应用 -->
                <div class="menu-group">
                    <div class="menu-item level-1" data-menu="commercial-auth">
                        <i data-lucide="banknote" class="menu-icon"></i>
                        <span class="menu-text">商业化权应用</span>
                        <i data-lucide="chevron-down" class="expand-icon"></i>
                    </div>
                    <div class="submenu">
                        <div class="menu-item level-2" data-submenu="commercial-management">
                            <span class="menu-text">授权管理</span>
                        </div>
                    </div>
                </div>

                <!-- 一级菜单：IP资产应用 -->
                <div class="menu-group">
                    <div class="menu-item level-1" data-menu="material-library">
                        <i data-lucide="folder" class="menu-icon"></i>
                        <span class="menu-text">IP资产应用</span>
                        <i data-lucide="chevron-down" class="expand-icon"></i>
                    </div>
                    <div class="submenu">
                        <div class="menu-item level-2" data-submenu="material-overview">
                            <span class="menu-text">素材库概览</span>
                        </div>
                        <div class="menu-item level-2" data-submenu="material-query">
                            <span class="menu-text">素材查询与申用</span>
                        </div>
                        <div class="menu-item level-2" data-submenu="material-upload">
                            <span class="menu-text">素材上传</span>
                        </div>
                        <div class="menu-item level-2" data-submenu="material-tools">
                            <span class="menu-text">素材工具箱</span>
                        </div>
                    </div>
                </div>

                <!-- 一级菜单：导出中心 -->
                <div class="menu-group">
                    <div class="menu-item level-1" data-menu="export-center" data-submenu-direct="export-center">
                        <i data-lucide="hard-drive-download" class="menu-icon"></i>
                        <span class="menu-text">导出中心</span>
                    </div>
                </div>
            </nav>
        </aside>

        <!-- 右侧内容区 -->
        <main class="content-area">
            <!-- 未开发的Tab页面 -->
            <div class="tab-content" id="panorama-content" style="display: none;">
                <div class="under-development">
                    <i data-lucide="construction" class="dev-icon"></i>
                    <h2>功能开发中</h2>
                    <p>IP全景图模块正在开发中，敬请期待</p>
                </div>
            </div>

            <div class="tab-content" id="import-content" style="display: none;">
                <div class="under-development">
                    <i data-lucide="construction" class="dev-icon"></i>
                    <h2>功能开发中</h2>
                    <p>IP引入模块正在开发中，敬请期待</p>
                </div>
            </div>

            <div class="tab-content" id="production-content" style="display: none;">
                <div class="under-development">
                    <i data-lucide="construction" class="dev-icon"></i>
                    <h2>功能开发中</h2>
                    <p>IP权益生产模块正在开发中，敬请期待</p>
                </div>
            </div>

            <!-- IP权益应用内容区（默认显示） -->
            <div class="tab-content active" id="monetization-content">
                <div class="page-content">
                    <div class="under-development">
                        <i data-lucide="layout-dashboard" class="dev-icon"></i>
                        <h2>页面开发中</h2>
                        <p>请从左侧菜单选择功能模块</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 主框架逻辑 -->
    <script src="js/framework.js"></script>
    <!-- 模块加载器 -->
    <script src="js/module-loader.js"></script>
    <!-- 角色切换器（演示用） -->
    <script src="js/role-switcher.js"></script>
    <script>
        // 初始化Lucide图标
        try { lucide.createIcons(); } catch(e) { console.warn('Lucide初始化失败:', e); }
    </script>
</body>
</html>
