<!-- 申用记录页面 -->
<div class="application-records-container">
    <!-- 页面导航 -->
    <div class="page-breadcrumb">
        <div>
            <span class="breadcrumb-item" id="backToMaterialQuery">
                <i data-lucide="folder" class="breadcrumb-icon"></i>
                <span>素材查询与申用</span>
            </span>
            <i data-lucide="chevron-right" class="breadcrumb-separator"></i>
            <span class="breadcrumb-item active">申用记录</span>
        </div>
    </div>

    <!-- 页面标题 -->
    <div class="page-header">
        <div class="page-title">
            <h1>申用记录</h1>
            <span class="record-count">共 <strong id="totalRecords">0</strong> 条记录</span>
        </div>
    </div>

    <!-- 筛选区域 -->
    <div class="filter-section">
        <!-- 申请状态筛选 -->
        <div class="filter-group">
            <label class="filter-label">申请状态</label>
            <div class="select-wrapper">
                <select class="filter-select" id="statusFilter">
                    <option value="all">全部状态</option>
                    <option value="draft">已保存</option>
                    <option value="pending">待审核</option>
                    <option value="approved">已通过</option>
                    <option value="rejected">已驳回</option>
                    <option value="cancelled">已取消</option>
                </select>
                <i data-lucide="chevron-down" class="select-icon"></i>
            </div>
        </div>

        <!-- 申请时间筛选 -->
        <div class="filter-group">
            <label class="filter-label">申请时间</label>
            <div class="select-wrapper">
                <select class="filter-select" id="timeFilter">
                    <option value="all">全部时间</option>
                    <option value="today">今天</option>
                    <option value="week">最近一周</option>
                    <option value="month">最近一月</option>
                    <option value="quarter">最近三月</option>
                </select>
                <i data-lucide="chevron-down" class="select-icon"></i>
            </div>
        </div>

        <!-- 搜索框 -->
        <div class="search-group">
            <div class="search-input-wrapper">
                <i data-lucide="search" class="search-icon"></i>
                <input 
                    type="text" 
                    class="search-input" 
                    placeholder="搜索项目名称或IP名称"
                    id="recordSearchInput"
                />
                <button class="search-clear" id="searchClearRecords" style="display: none;">
                    <i data-lucide="x"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- 申用记录表格 -->
    <div class="records-table-wrapper">
        <table class="records-table">
            <thead>
                <tr>
                    <th width="8%">申请编号</th>
                    <th width="14%">项目名称</th>
                    <th width="10%">IP名称</th>
                    <th width="8%">素材数量</th>
                    <th width="10%">使用类型</th>
                    <th width="9%">申请人</th>
                    <th width="11%">申请时间</th>
                    <th width="10%">申请状态</th>
                    <th width="10%">申请预览</th>
                    <th width="10%">操作</th>
                </tr>
            </thead>
            <tbody id="recordsTableBody">
                <!-- 表格内容由JavaScript动态生成 -->
            </tbody>
        </table>
    </div>

    <!-- 空状态提示 -->
    <div class="empty-state" id="emptyState" style="display: none;">
        <i data-lucide="inbox" class="empty-icon"></i>
        <p>暂无申用记录</p>
    </div>

    <!-- 分页器 -->
    <div class="pagination" id="pagination">
        <button class="pagination-btn" id="prevPage" disabled>
            <i data-lucide="chevron-left"></i>
            <span>上一页</span>
        </button>
        <div class="pagination-info">
            <span>第 <strong id="currentPage">1</strong> / <strong id="totalPages">1</strong> 页</span>
        </div>
        <button class="pagination-btn" id="nextPage">
            <span>下一页</span>
            <i data-lucide="chevron-right"></i>
        </button>
    </div>
</div>

</div>

    // 根据状态返回操作按钮
    function getActionButton(record) {
        switch(record.status) {
            case 'draft':
                // 已保存记录 - 确认申请
                return `
                    <button class="action-btn btn-confirm" data-action="confirm" data-id="${record.applyNo}">
                        确认申请
                    </button>
                `;
            case 'pending':
                // 待审核记录 - 取消申请
                return `
                    <button class="action-btn btn-cancel" data-action="cancel" data-id="${record.applyNo}">
                        取消申请
                    </button>
                `;
            case 'approved':
                // 已通过记录 - 无操作
                return '<span style="color: #999; font-size: 13px;">-</span>';
            case 'rejected':
            case 'cancelled':
                // 已驳回/已取消记录 - 重新申请
                return `
                    <button class="action-btn btn-reapply" data-action="reapply" data-id="${record.applyNo}">
                        重新申请
                    </button>
                `;
            default:
                return '';
        }
    }

    // 初始化页面

    // 渲染记录表格
    function renderRecords() {
        const tbody = document.getElementById('recordsTableBody');
        const emptyState = document.getElementById('emptyState');
        const recordsTable = document.querySelector('.records-table-wrapper');

        if (currentRecords.length === 0) {
            recordsTable.style.display = 'none';
            emptyState.style.display = 'flex';
            document.getElementById('totalRecords').textContent = '0';
            return;
        }

        recordsTable.style.display = 'block';
        emptyState.style.display = 'none';
        document.getElementById('totalRecords').textContent = currentRecords.length;

        const start = (currentPage - 1) * pageSize;
        const end = start + pageSize;
        const pageRecords = currentRecords.slice(start, end);

        tbody.innerHTML = pageRecords.map(record => {
            const statusInfo = statusConfig[record.status];
            return `
                <tr data-record-id="${record.applyNo}">
                    <td><span class="apply-no">${record.applyNo}</span></td>
                    <td><span class="project-name" title="${record.projectName}">${record.projectName}</span></td>
                    <td>${record.ipName}</td>
                    <td><span class="material-count">${record.materialCount}</span></td>
                    <td>${record.usageType}</td>
                    <td>${record.applicant}</td>
                    <td>${record.applyTime}</td>
                    <td><span class="status-badge ${statusInfo.class}">${statusInfo.text}</span></td>
                    <td>
                        <div class="view-action">
                            <button class="action-btn btn-view" data-action="view" data-id="${record.applyNo}">
                                查看
                            </button>
                        </div>
                    </td>
                    <td>
                        <div class="table-actions">
                            ${getActionButton(record)}
                        </div>
                    </td>
                </tr>
            `;
        }).join('');

        lucide.createIcons();
        updatePagination();
    }

    // 更新分页信息
    function updatePagination() {
        const totalPages = Math.ceil(currentRecords.length / pageSize);
        document.getElementById('currentPage').textContent = currentPage;
        document.getElementById('totalPages').textContent = totalPages;
        document.getElementById('prevPage').disabled = currentPage === 1;
        document.getElementById('nextPage').disabled = currentPage >= totalPages;
    }

    // 显示详情弹窗

        const record = mockRecords.find(r => r.applyNo === applyNo);
        if (!record) return;

        document.getElementById('detailApplyNo').textContent = record.applyNo;
        document.getElementById('detailProjectName').textContent = record.projectName;
        document.getElementById('detailIPName').textContent = record.ipName;
        document.getElementById('detailUsageType').textContent = record.usageType;
        document.getElementById('detailApplicant').textContent = record.applicant;
        document.getElementById('detailDepartment').textContent = record.department;
        document.getElementById('detailApplyTime').textContent = record.applyTime;
        
        const statusInfo = statusConfig[record.status];
        document.getElementById('detailStatus').innerHTML = `<span class="status-badge ${statusInfo.class}">${statusInfo.text}</span>`;
        document.getElementById('detailUsageDesc').textContent = record.usageDesc;
        document.getElementById('detailMaterialCount').textContent = record.materials.length;

        const materialsList = document.getElementById('detailMaterialsList');
        materialsList.innerHTML = record.materials.map(material => `
            <div class="material-item">
                <div class="material-icon">
                    <i data-lucide="file-image"></i>
                </div>
                <div class="material-info">
                    <div class="material-name">
                        ${material.name}
                        ${material.projectFile ? '<span class="project-file-badge">含工程文件</span>' : ''}
                    </div>
                    <div class="material-meta">${material.id} · ${material.format} · ${material.size}</div>
                </div>
            </div>
        `).join('');

        document.getElementById('recordDetailModal').style.display = 'flex';
        lucide.createIcons();
    }

    // 绑定事件
    function bindEvents() {
        // 返回按钮
        const backBtn = document.getElementById('backToMaterialQuery');
        console.log('[申用记录] 绑定返回按钮:', backBtn);
        
        if (backBtn) {
            backBtn.addEventListener('click', function(e) {
                console.log('[申用记录] 点击返回按钮');
                e.preventDefault();
                e.stopPropagation();
                
                // 使用全局的模块加载器重新加载一级页
                if (typeof loadModule === 'function') {
                    console.log('[申用记录] 调用loadModule重新加载一级页');
                    loadModule('module-material-query');
                } else if (window.moduleLoader && typeof window.moduleLoader.loadModule === 'function') {
                    console.log('[申用记录] 调用moduleLoader.loadModule重新加载一级页');
                    window.moduleLoader.loadModule('module-material-query');
                } else {
                    console.error('[申用记录] 未找到模块加载器，尝试手动重新加载');
                    // 手动触发模块加载事件
                    const event = new CustomEvent('loadModule', {
                        detail: { moduleId: 'module-material-query' }
                    });
                    document.dispatchEvent(event);
                }
            });
        } else {
            console.error('[申用记录] 未找到返回按钮元素');
        }

        // 筛选器
        document.getElementById('statusFilter')?.addEventListener('change', filterRecords);
        document.getElementById('timeFilter')?.addEventListener('change', filterRecords);
        document.getElementById('recordSearchInput')?.addEventListener('input', filterRecords);

        // 表格操作按钮
        document.getElementById('recordsTableBody')?.addEventListener('click', (e) => {
            const btn = e.target.closest('.action-btn');
            if (!btn) return;

            const action = btn.dataset.action;
            const id = btn.dataset.id;

            if (action === 'view') {
                showDetailModal(id);
            } else if (action === 'confirm') {
                // 确认申请 - 打开确认弹窗
                pendingConfirmId = id;
                document.getElementById('confirmSubmitModal').style.display = 'flex';
                lucide.createIcons();
            } else if (action === 'cancel') {
                // 取消申请
                const record = mockRecords.find(r => r.applyNo === id);
                if (record) {
                    record.status = 'cancelled';
                    currentRecords = [...mockRecords];
                    renderRecords();
                    alert('申请已取消');
                }
            } else if (action === 'reapply') {
                // 重新申请
                const record = mockRecords.find(r => r.applyNo === id);
                if (record) {
                    record.status = 'draft';
                    currentRecords = [...mockRecords];
                    renderRecords();
                    alert('已恢复为草稿状态，请修改后重新提交');
                }
            }
        });

        // 确认提交按钮
        document.getElementById('confirmSubmitBtn')?.addEventListener('click', () => {
            if (pendingConfirmId) {
                const record = mockRecords.find(r => r.applyNo === pendingConfirmId);
                if (record) {
                    record.status = 'pending';
                    currentRecords = [...mockRecords];
                    renderRecords();
                    
                    // 关闭弹窗
                    document.getElementById('confirmSubmitModal').style.display = 'none';
                    pendingConfirmId = null;
                    
                    // 显示成功提示
                    alert('申请已提交，等待审核！');
                }
            }
        });

        // 分页按钮
        document.getElementById('prevPage')?.addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                renderRecords();
            }
        });

        document.getElementById('nextPage')?.addEventListener('click', () => {
            const totalPages = Math.ceil(currentRecords.length / pageSize);
            if (currentPage < totalPages) {
                currentPage++;
                renderRecords();
            }
        });

        // 弹窗关闭
        document.querySelectorAll('[data-modal]').forEach(btn => {
            btn.addEventListener('click', () => {
                const modalId = btn.dataset.modal;
                document.getElementById(modalId).style.display = 'none';
            });
        });
    }

    // 筛选记录
    function filterRecords() {
        const statusFilter = document.getElementById('statusFilter').value;
        const searchText = document.getElementById('recordSearchInput').value.toLowerCase();

        currentRecords = mockRecords.filter(record => {
            const matchStatus = statusFilter === 'all' || record.status === statusFilter;
            const matchSearch = !searchText || 
                record.projectName.toLowerCase().includes(searchText) ||
                record.ipName.toLowerCase().includes(searchText);
            
            return matchStatus && matchSearch;
        });

        currentPage = 1;
        renderRecords();
    }

    // 页面加载后初始化
    console.log('[申用记录] 脚本开始执行，mockRecords数量:', mockRecords.length);
    console.log('[申用记录] recordsTableBody元素:', document.getElementById('recordsTableBody'));
    
    // 检查是否有新创建的记录
    if (window.newApplicationRecord) {
        console.log('[申用记录] 检测到新记录:', window.newApplicationRecord);
        const newRec = window.newApplicationRecord;
        // 将新记录添加到列表开头
        mockRecords.unshift(newRec);
        currentRecords = [...mockRecords];
        
        // 显示成功提示
        const statusText = newRec.status === 'draft' ? '保存成功' : '提交成功';
        setTimeout(() => {
            alert(`申请${statusText}！\n\n申请编号：${newRec.applyNo}\n项目名称：${newRec.projectName}\n申请素材：${newRec.materialCount}个`);
        }, 300);
        
        // 清除全局变量
        delete window.newApplicationRecord;
    }
    
    // 立即初始化
    init();
})();
</script>
